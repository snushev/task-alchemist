{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-10 border border-gray-200 rounded-3xl shadow-xl">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-black text-slate-900">Sign In</h2>
        <p class="text-gray-500 text-sm">Welcome back, Alchemist.</p>
    </div>
    <form method="post" class="space-y-5">
        {% csrf_token %}
        {% for field in form %}
        <div class="flex flex-col">
            <label class="text-xs font-bold text-slate-500 mb-1 uppercase ml-1">{{ field.label }}</label>
            <input type="{{ field.field.widget.input_type|default:'text' }}" name="{{ field.name }}" 
                   class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium">
            {% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg transition-all">LOG IN</button>
    </form>
</div>
{% endblock %}
