{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="mb-6 text-center">
        <h1 class="text-3xl font-black text-slate-900 uppercase tracking-tighter">Add Secret to Vault</h1>
        <p class="text-gray-500">Your data will be encrypted with Fernet (AES-128/256).</p>
    </div>

    <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl border-b-4 border-blue-500">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div class="text-blue-100 space-y-4 custom-vault-form">
                {{ form.as_p }}
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-lg">
                🔒 Encrypt & Save
            </button>
        </form>
    </div>
</div>

<style>
    .custom-vault-form input, .custom-vault-form select, .custom-vault-form textarea {
        background: #1e293b !important;
        border: 1px solid #334155 !important;
        color: #60a5fa !important;
        width: 100%;
        padding: 0.5rem;
        border-radius: 0.5rem;
    }
</style>
{% endblock %}
