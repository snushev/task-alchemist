{% extends 'base.html' %}

{% block title %}403 - Restricted Knowledge{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-24 text-center">
  <div class="relative mb-8">
    <h1 class="text-9xl font-black text-red-50 py-2 uppercase tracking-tighter">403</h1>
    <div class="absolute inset-0 flex items-center justify-center">
      <h2 class="text-2xl font-black text-red-600 uppercase tracking-widest bg-white px-4">
        Forbidden
      </h2>
    </div>
  </div>

  <div class="max-w-md border-t-2 border-red-600 pt-6">
    <p class="text-xl font-bold text-slate-700 mb-2">The Alchemist denies your request.</p>
    <p class="text-gray-500 mb-10 leading-relaxed">
      You do not have the required clearance to access this transmutation circle. This incident might be logged.
    </p>

    <a href="{% url 'dashboard' %}"
      class="inline-block bg-slate-900 text-white px-8 py-4 rounded-xl font-black hover:bg-red-600 transition-all shadow-lg">
      BACK TO SAFETY
    </a>
  </div>
</div>
{% endblock %}
