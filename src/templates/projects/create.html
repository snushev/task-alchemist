{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white p-10 border border-gray-200 rounded-3xl shadow-sm">
    <h2 class="text-3xl font-black mb-6 italic text-slate-900">Brew a New Project</h2>
    <form method="post" class="space-y-6">
        {% csrf_token %}
        {% for field in form %}
        <div class="flex flex-col">
            <label class="text-xs font-bold text-slate-500 mb-1 uppercase ml-1">{{ field.label }}</label>
            {% if field.name == 'description' %}
                <textarea name="{{ field.name }}" rows="4" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
            {% else %}
                <input type="text" name="{{ field.name }}" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            {% endif %}
        </div>
        {% endfor %}
        <div class="flex gap-4">
            <button type="submit" class="flex-1 bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-black transition">Create Project</button>
            <a href="{% url 'dashboard' %}" class="flex-1 bg-gray-100 text-gray-500 font-bold py-4 rounded-xl text-center hover:bg-gray-200 transition">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
